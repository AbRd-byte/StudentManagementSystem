name: Build and Deploy Student Management API

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore Packages
        run: dotnet restore StudentManagementSystem.sln

      - name: Build Solution
        run: dotnet build StudentManagementSystem.sln --configuration Release --no-restore

      - name: Publish API
        run: |
          dotnet publish StudentManagementSystem/StudentManagementSystem.csproj \
            --configuration Release \
            --no-build \
            --output ./publish

      - name: Upload Publish Artifact
        uses: actions/upload-artifact@v4
        with:
          name: StudentManagementAPI
          path: ./publish

      - name: Trigger Render Deployment
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          echo "Triggering Render Deployment..."
          curl --fail --request POST "$RENDER_DEPLOY_HOOK"

      - name: Deployment Completed
        run: echo "Render deployment triggered successfully."
